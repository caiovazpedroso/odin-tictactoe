<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Caio's TOP Tic-Tac-Toe</title>
    <link href="style.css" rel="stylesheet">
</head>
<body>
    <div id="header">
        <div id="title">
            Odin's Tic Tac Toe  
        </div>
    </div>
    <div id="body">
        <dialog id="dialog-box">
            <div id="dialog-text"></div>
            <button id="dialog-close">Close</button>
        </dialog>
        <div id="game-area">
            <div id="game-box"></div>
            <div id="scoreboard">
                <div class="player-card" id="player-one">
                    <dialog class="dialog-name">
                        <form id="name-form" method="dialog">
                            <input type="text" class="input-name-one" required autofocus>
                            <button type="submit" value="confirm">Confirm</button>
                        </form>
                    </dialog>
                    <div class="player-title">Player 1</div>
                    <div class="player-info">
                        <div class="player-name" contenteditable="true">NAME</div>
                        <div class="edit-name">✏️</div>
                        <div class="player-score">0</div>
                    </div>
                </div>
                <div class="player-card" id="player-two">
                    <dialog class="dialog-name">
                        <form id="name-form" method="dialog">
                            <input type="text" class="input-name-two" required autofocus>
                            <button type="submit" value="confirm">Confirm</button>
                        </form>
                    </dialog>
                    <div class="player-title">Player 2</div>
                    <div class="player-info">
                        <div class="player-score">0</div>
                        <div class="edit-name">✏️</div>
                        <div class="player-name" contenteditable="true">NAME</div>
                    </div>
                </div>
            </div> 
        </div>
        <div id="player-display"></div>   
    </div>
    <div id="footer">    
        aaa
    </div>
    <script src="script.js"></script>
</body>
</html>
