<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Caio's TOP Tic-Tac-Toe</title>
    <link href="style.css" rel="stylesheet">
</head>
<body>
    <div id="header">
        <div id="title">
            Odin's Tic Tac Toe  
        </div>
    </div>
    <div id="body">
        <dialog id="dialog-box">
            <div id="dialog-text"></div>
            <button id="dialog-close">Close</button>
        </dialog>
        <div id="game-box"></div>
        <div id="scoreboard">
            <div id="board-player-one">
                <dialog id="dialog-one">
                    <form class="one-name" method="dialog">
                        <input type="text" class="one-name" required autofocus>
                    </form>
                </dialog>
                <div id="player-title">Player 1</div>
                <div id="player-card">
                    <div class="name">NAME</div>
                    <button id="change-name-one"></button>
                    <div class="score" id="player-one-score">0</div>
                </div>
            </div>
            <div id="board-player-two">
                <dialog id="dialog-two">
                    <form class="two-name" method="dialog">
                        <input type="text" class="two-name" required autofocus>
                    </form>
                </dialog>
                <div id="player-title">Player 2</div>
                <div id="player-card">
                    <div class="name">NAME</div>
                    <button id="change-name-two"></button>
                    <div class="score" id="player-two-score">0</div>
                </div>
            </div>
        </div> 
        <div id="player-display"></div>   
    </div>
    <div id="footer">    
        aaa
    </div>
    <script src="script.js"></script>
</body>
</html>
